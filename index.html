<!DOCTYPE html>
<html>
<head>
<title>Snake Ultimate</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
:root{
  --neon-green:#00ff88;
  --neon-blue:#00c3ff;
  --neon-pink:#ff0080;
  --neon-gold:#ffd700;
  --bg-dark:#060a0f;
  --bg-card:rgba(0,255,136,0.04);
  --border-neon:rgba(0,255,136,0.25);
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  background:var(--bg-dark);
  color:white;
  font-family:'Orbitron',monospace;
  text-align:center;
  overflow:hidden;
  min-height:100vh;
  position:relative;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(0,255,136,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,255,136,0.03) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
  z-index:0;
}

body::after{
  content:'';
  position:fixed;
  top:-200px;left:50%;
  transform:translateX(-50%);
  width:600px;height:600px;
  background:radial-gradient(circle,rgba(0,255,136,0.06) 0%,transparent 70%);
  pointer-events:none;
  z-index:0;
}

.screen{
  position:relative;z-index:1;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;padding:20px;
}

.main-title{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(20px,4vw,42px);
  color:var(--neon-green);
  text-shadow:0 0 20px var(--neon-green),0 0 60px rgba(0,255,136,0.4);
  margin-bottom:8px;
  animation:titlePulse 3s ease-in-out infinite;
}

@keyframes titlePulse{
  0%,100%{text-shadow:0 0 20px var(--neon-green),0 0 60px rgba(0,255,136,0.4);}
  50%{text-shadow:0 0 40px var(--neon-green),0 0 100px rgba(0,255,136,0.7),0 0 140px rgba(0,255,136,0.3);}
}

.subtitle{
  font-size:10px;
  color:rgba(0,255,136,0.5);
  letter-spacing:6px;
  margin-bottom:40px;
  text-transform:uppercase;
}

.card{
  background:var(--bg-card);
  border:1px solid var(--border-neon);
  border-radius:12px;
  padding:30px;
  width:100%;max-width:380px;
  backdrop-filter:blur(10px);
  box-shadow:0 0 40px rgba(0,255,136,0.05),inset 0 1px 0 rgba(255,255,255,0.05);
}

input{
  width:100%;
  padding:12px 16px;
  margin:8px 0;
  background:rgba(0,0,0,0.4);
  border:1px solid rgba(0,255,136,0.2);
  border-radius:8px;
  color:white;
  font-family:'Orbitron',monospace;
  font-size:13px;
  outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
}

input::placeholder{color:rgba(255,255,255,0.25);}
input:focus{
  border-color:var(--neon-green);
  box-shadow:0 0 15px rgba(0,255,136,0.2);
}

.btn{
  padding:12px 24px;
  font-size:12px;
  font-family:'Orbitron',monospace;
  font-weight:700;
  margin:6px;
  cursor:pointer;
  border:none;
  border-radius:8px;
  transition:all 0.2s;
  letter-spacing:1px;
  text-transform:uppercase;
  position:relative;
  overflow:hidden;
}

.btn-primary{
  background:linear-gradient(135deg,var(--neon-green),#00a855);
  color:#060a0f;
  box-shadow:0 4px 20px rgba(0,255,136,0.3);
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,255,136,0.5);}

.btn-secondary{
  background:transparent;
  color:var(--neon-green);
  border:1px solid var(--neon-green);
  box-shadow:0 0 10px rgba(0,255,136,0.1);
}
.btn-secondary:hover{background:rgba(0,255,136,0.1);box-shadow:0 0 20px rgba(0,255,136,0.3);}

.btn-danger{background:linear-gradient(135deg,var(--neon-pink),#aa0055);color:white;}
.btn-gold{background:linear-gradient(135deg,var(--neon-gold),#cc8800);color:#060a0f;}

.msg{font-size:11px;margin-top:10px;padding:8px;border-radius:6px;min-height:20px;}
.msg.error{color:var(--neon-pink);background:rgba(255,0,128,0.08);border:1px solid rgba(255,0,128,0.2);}
.msg.success{color:var(--neon-green);background:rgba(0,255,136,0.08);border:1px solid rgba(0,255,136,0.2);}

.divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:rgba(255,255,255,0.2);font-size:10px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.1);}

.menu-buttons{display:flex;flex-direction:column;gap:10px;width:100%;max-width:280px;}

.score-bar{
  display:flex;justify-content:space-between;align-items:center;
  width:100%;max-width:440px;
  padding:10px 16px;
  background:rgba(0,0,0,0.5);
  border:1px solid var(--border-neon);
  border-radius:8px;
  margin-bottom:6px;
  font-size:11px;
}
.score-val{color:var(--neon-green);font-weight:700;font-size:16px;}
.objective-tag{
  font-size:9px;padding:4px 10px;
  background:rgba(0,195,255,0.1);
  border:1px solid rgba(0,195,255,0.3);
  border-radius:20px;color:var(--neon-blue);
}

/* BONUS BAR */
#bonusBar{
  display:flex;gap:8px;align-items:center;justify-content:center;
  width:100%;max-width:440px;
  min-height:32px;
  margin-bottom:6px;
  flex-wrap:wrap;
}
.bonus-ind{
  display:flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:20px;
  font-size:10px;font-weight:700;border:1px solid;
  animation:bpop 0.3s ease;
}
@keyframes bpop{0%{transform:scale(0);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.b-phantom{color:#a78bfa;border-color:rgba(167,139,250,0.5);background:rgba(167,139,250,0.08);}
.b-clockFast{color:#f97316;border-color:rgba(249,115,22,0.5);background:rgba(249,115,22,0.08);}
.b-clockSlow{color:#60a5fa;border-color:rgba(96,165,250,0.5);background:rgba(96,165,250,0.08);}
.b-rain{color:#34d399;border-color:rgba(52,211,153,0.5);background:rgba(52,211,153,0.08);}
.b-star{color:var(--neon-gold);border-color:rgba(255,215,0,0.6);background:rgba(255,215,0,0.1);}
.btimer{font-size:12px;font-weight:900;}

canvas{
  background:#0a0f0a;
  border:2px solid rgba(0,255,136,0.3);
  border-radius:8px;
  box-shadow:0 0 30px rgba(0,255,136,0.1),0 0 60px rgba(0,255,136,0.05);
  max-width:90vw;max-height:50vh;
  display:block;
}

@keyframes rainbow{
  0%{box-shadow:0 0 30px #ff0000,0 0 60px rgba(255,0,0,0.3);}
  16%{box-shadow:0 0 30px #ff8800,0 0 60px rgba(255,136,0,0.3);}
  33%{box-shadow:0 0 30px #ffff00,0 0 60px rgba(255,255,0,0.3);}
  50%{box-shadow:0 0 30px #00ff00,0 0 60px rgba(0,255,0,0.3);}
  66%{box-shadow:0 0 30px #0088ff,0 0 60px rgba(0,136,255,0.3);}
  83%{box-shadow:0 0 30px #8800ff,0 0 60px rgba(136,0,255,0.3);}
  100%{box-shadow:0 0 30px #ff0000,0 0 60px rgba(255,0,0,0.3);}
}
canvas.star-active{animation:rainbow 0.5s linear infinite;}

@keyframes resetFlash{
  0%,100%{border-color:rgba(0,255,136,0.3);}
  50%{border-color:#fff;box-shadow:0 0 50px white;}
}
canvas.reset-flash{animation:resetFlash 0.4s ease 3;}

#mobileControls{display:none;margin-top:15px;}
#mobileControls .btn{font-size:22px;padding:12px 18px;margin:3px;}
@media(max-width:768px){#mobileControls{display:block;}}

.levels-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:8px;width:100%;max-width:380px;
  max-height:55vh;overflow-y:auto;padding-right:4px;
}
.levels-grid::-webkit-scrollbar{width:4px;}
.levels-grid::-webkit-scrollbar-track{background:transparent;}
.levels-grid::-webkit-scrollbar-thumb{background:var(--neon-green);border-radius:4px;}

.level-card{padding:12px;background:rgba(0,0,0,0.3);border:1px solid rgba(0,255,136,0.15);border-radius:8px;cursor:pointer;transition:all 0.2s;font-size:10px;}
.level-card:hover{border-color:var(--neon-green);background:rgba(0,255,136,0.08);transform:translateY(-2px);}
.level-card.completed{border-color:var(--neon-gold);background:rgba(255,215,0,0.05);}
.level-card.completed .level-num{color:var(--neon-gold);}
.level-num{font-size:14px;font-weight:700;color:var(--neon-green);margin-bottom:4px;}
.level-goal{color:rgba(255,255,255,0.5);font-size:9px;}

.lb-entry{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;margin:4px 0;border-radius:8px;font-size:11px;background:rgba(0,0,0,0.3);border:1px solid rgba(0,255,136,0.1);transition:all 0.2s;}
.lb-entry:hover{background:rgba(0,255,136,0.05);}
.lb-entry.rank-1{border-color:rgba(255,215,0,0.4);background:rgba(255,215,0,0.05);}
.lb-entry.rank-2{border-color:rgba(192,192,192,0.4);}
.lb-entry.rank-3{border-color:rgba(205,127,50,0.4);}
.lb-entry.me{border-color:var(--neon-blue);background:rgba(0,195,255,0.05);}
.lb-rank{font-size:16px;min-width:30px;}
.lb-name{flex:1;text-align:left;margin-left:10px;}
.lb-score{color:var(--neon-green);font-weight:700;}

.profile-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;width:100%;margin:16px 0;}
.stat-box{padding:12px 8px;background:rgba(0,0,0,0.3);border:1px solid var(--border-neon);border-radius:8px;}
.stat-val{font-size:18px;color:var(--neon-green);font-weight:700;}
.stat-label{font-size:8px;color:rgba(255,255,255,0.4);margin-top:4px;}
.username-display{font-size:20px;font-weight:700;color:white;margin:8px 0;}
.username-tag{font-size:9px;padding:3px 10px;background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.3);border-radius:20px;color:var(--neon-green);display:inline-block;margin-bottom:16px;}

.result-icon{font-size:60px;margin-bottom:10px;animation:bounce 0.5s ease;}
@keyframes bounce{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
.result-score{font-size:28px;color:var(--neon-green);margin:8px 0;}
.result-sub{font-size:10px;color:rgba(255,255,255,0.4);margin-bottom:20px;}

#countdownOverlay{
  position:fixed;inset:0;z-index:50;
  display:flex;align-items:center;justify-content:center;
  background:rgba(6,10,15,0.75);
  backdrop-filter:blur(4px);
  pointer-events:none;
}
#countdownOverlay.hidden{display:none!important;}
#countdownNumber{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(60px,15vw,120px);
  color:var(--neon-green);
  text-shadow:0 0 40px var(--neon-green),0 0 80px rgba(0,255,136,0.5);
  animation:cdPop 0.4s ease;
}
@keyframes cdPop{0%{transform:scale(1.8);opacity:0}100%{transform:scale(1);opacity:1}}

#pauseOverlay{
  position:fixed;inset:0;z-index:50;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:16px;
  background:rgba(6,10,15,0.85);
  backdrop-filter:blur(6px);
}
#pauseOverlay.hidden{display:none!important;}
.pause-title{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(18px,4vw,32px);
  color:var(--neon-blue);
  text-shadow:0 0 20px var(--neon-blue);
  margin-bottom:10px;
}
#pauseBtn{
  position:fixed;top:12px;right:12px;z-index:40;
  padding:8px 14px;font-size:11px;
  font-family:'Orbitron',monospace;font-weight:700;
  background:rgba(0,0,0,0.6);border:1px solid rgba(0,195,255,0.4);
  color:var(--neon-blue);border-radius:8px;cursor:pointer;transition:all 0.2s;
}
#pauseBtn:hover{background:rgba(0,195,255,0.15);}

#loading{
  position:fixed;inset:0;z-index:999;
  background:var(--bg-dark);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:16px;
}
.loader{width:40px;height:40px;border:3px solid rgba(0,255,136,0.2);border-top-color:var(--neon-green);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

.hidden{display:none!important;}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loading">
  <div style="font-family:'Press Start 2P',monospace;font-size:18px;color:var(--neon-green);text-shadow:0 0 20px var(--neon-green)">🐍</div>
  <div class="loader"></div>
  <div style="font-size:9px;color:rgba(0,255,136,0.5);letter-spacing:3px">CHARGEMENT...</div>
</div>

<!-- AUTH - REGISTER -->
<div id="screenAuth" class="screen hidden">
  <div class="main-title">🐍 SNAKE</div>
  <div class="subtitle">U L T I M A T E</div>
  <div class="card">
    <div style="font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:20px;letter-spacing:2px">CRÉER UN COMPTE</div>
    <input id="regUser" placeholder="Pseudo" autocomplete="off">
    <input id="regPass" type="password" placeholder="Mot de passe">
    <input id="regPass2" type="password" placeholder="Confirmer le mot de passe">
    <button class="btn btn-primary" style="width:100%;margin-top:12px" onclick="register()">Créer mon compte</button>
    <div class="divider">ou</div>
    <button class="btn btn-secondary" style="width:100%" onclick="showScreen('screenLogin')">J'ai déjà un compte</button>
    <div id="regMsg" class="msg"></div>
  </div>
</div>

<!-- AUTH - LOGIN -->
<div id="screenLogin" class="screen hidden">
  <div class="main-title">🐍 SNAKE</div>
  <div class="subtitle">U L T I M A T E</div>
  <div class="card">
    <div style="font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:20px;letter-spacing:2px">CONNEXION</div>
    <input id="loginUser" placeholder="Pseudo" autocomplete="off">
    <input id="loginPass" type="password" placeholder="Mot de passe">
    <button class="btn btn-primary" style="width:100%;margin-top:12px" onclick="login()">Se connecter</button>
    <div class="divider">ou</div>
    <button class="btn btn-secondary" style="width:100%" onclick="showScreen('screenAuth')">Créer un compte</button>
    <div id="loginMsg" class="msg"></div>
  </div>
</div>

<!-- MENU -->
<div id="screenMenu" class="screen hidden">
  <div class="main-title">🐍 SNAKE</div>
  <div class="subtitle">U L T I M A T E</div>
  <h3 id="bestScore" style="font-size:12px;color:var(--neon-gold);margin-bottom:24px;"></h3>
  <div class="menu-buttons">
    <button class="btn btn-primary" onclick="startClassic()">▶ Mode Classique</button>
    <button class="btn btn-secondary" onclick="showScreen('screenAdventure');updateAdventureUI()">🗺 Mode Aventure</button>
    <button class="btn btn-secondary" onclick="showLeaderboard()">🏆 Classement</button>
    <button class="btn btn-secondary" onclick="showProfile()">👤 Profil</button>
    <button class="btn btn-danger" style="margin-top:10px;font-size:10px" onclick="logout()">Déconnexion</button>
  </div>
</div>

<!-- ADVENTURE MENU -->
<div id="screenAdventure" class="screen hidden">
  <div class="main-title" style="font-size:clamp(14px,3vw,28px);margin-bottom:6px">MODE AVENTURE</div>
  <div class="subtitle" style="margin-bottom:20px">CHOISIR UN NIVEAU</div>
  <div id="levels" class="levels-grid"></div>
  <button class="btn btn-secondary" style="margin-top:16px" onclick="showScreen('screenMenu')">← Retour</button>
</div>

<!-- GAME -->
<div id="screenGame" class="screen hidden" style="padding:10px">
  <div class="score-bar">
    <div>
      <div style="font-size:9px;color:rgba(255,255,255,0.4)">SCORE</div>
      <div class="score-val" id="scoreDisplay">0</div>
    </div>
    <div id="objectiveTag" class="objective-tag hidden"></div>
    <div>
      <div style="font-size:9px;color:rgba(255,255,255,0.4)">QUEUE</div>
      <div style="font-size:14px;font-weight:700;color:var(--neon-blue)" id="tailDisplay">1</div>
    </div>
    <div>
      <div style="font-size:9px;color:rgba(255,255,255,0.4)">BEST</div>
      <div style="font-size:14px;font-weight:700;color:var(--neon-gold)" id="bestInGame">0</div>
    </div>
  </div>
  <div id="bonusBar"></div>
  <canvas id="canvas" width="400" height="400"></canvas>
  <div id="mobileControls">
    <div><button class="btn btn-secondary" onclick="mobileDir('up')">⬆️</button></div>
    <div>
      <button class="btn btn-secondary" onclick="mobileDir('left')">⬅️</button>
      <button class="btn btn-secondary" onclick="mobileDir('down')">⬇️</button>
      <button class="btn btn-secondary" onclick="mobileDir('right')">➡️</button>
    </div>
  </div>
</div>

<!-- COUNTDOWN OVERLAY -->
<div id="countdownOverlay" class="hidden">
  <div id="countdownNumber">3</div>
</div>

<!-- PAUSE OVERLAY -->
<div id="pauseOverlay" class="hidden">
  <div class="pause-title">⏸ PAUSE</div>
  <button class="btn btn-primary" onclick="resumeGame()">▶ Reprendre</button>
  <button class="btn btn-danger" onclick="quitToMenu()">⌂ Quitter la partie</button>
</div>

<button id="pauseBtn" class="hidden" onclick="togglePause()">⏸ PAUSE</button>

<!-- GAME OVER -->
<div id="screenGameover" class="screen hidden">
  <div class="result-icon">💀</div>
  <div style="font-family:'Press Start 2P',monospace;font-size:18px;color:var(--neon-pink);margin-bottom:8px">GAME OVER</div>
  <div class="result-score" id="goScore"></div>
  <div class="result-sub" id="goSub"></div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
    <button class="btn btn-primary" onclick="restartLevel()">↺ Rejouer</button>
    <button class="btn btn-secondary" onclick="goToMenu()">⌂ Menu</button>
  </div>
</div>

<!-- WIN -->
<div id="screenWin" class="screen hidden">
  <div class="result-icon">🏆</div>
  <div style="font-family:'Press Start 2P',monospace;font-size:16px;color:var(--neon-gold);margin-bottom:8px">NIVEAU TERMINÉ !</div>
  <div class="result-score" id="winScore"></div>
  <div class="result-sub" id="winSub"></div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
    <button class="btn btn-gold" onclick="nextLevel()">Niveau suivant →</button>
    <button class="btn btn-secondary" onclick="goToMenu()">⌂ Menu</button>
  </div>
</div>

<!-- LEADERBOARD -->
<div id="screenLeaderboard" class="screen hidden">
  <div class="main-title" style="font-size:clamp(14px,3vw,24px);margin-bottom:6px">🏆 CLASSEMENT</div>
  <div class="subtitle" style="margin-bottom:20px">TOP 10 MONDIAL</div>
  <div id="leaderboardList" style="width:100%;max-width:380px;max-height:55vh;overflow-y:auto"></div>
  <button class="btn btn-secondary" style="margin-top:16px" onclick="showScreen('screenMenu')">← Retour</button>
</div>

<!-- PROFIL -->
<div id="screenProfile" class="screen hidden">
  <div class="main-title" style="font-size:clamp(14px,3vw,24px);margin-bottom:6px">👤 PROFIL</div>
  <div class="card" style="max-width:360px">
    <div class="username-display" id="profileName"></div>
    <div class="username-tag">JOUEUR</div>
    <div class="profile-stats">
      <div class="stat-box"><div class="stat-val" id="profileBest">0</div><div class="stat-label">BEST SCORE</div></div>
      <div class="stat-box"><div class="stat-val" id="profileFruits">0</div><div class="stat-label">FRUITS</div></div>
      <div class="stat-box"><div class="stat-val" id="profileLevels">0</div><div class="stat-label">NIVEAUX</div></div>
    </div>
    <div id="profileRank" style="font-size:10px;color:rgba(255,255,255,0.4);margin-bottom:16px"></div>
  </div>
  <button class="btn btn-secondary" style="margin-top:16px" onclick="showScreen('screenMenu')">← Retour</button>
</div>

<script>

/* ===== FIREBASE CONFIG ===== */
const firebaseConfig = {
  apiKey: "AIzaSyDdzcbtAwYXDPfM1RAOk3YzzDfRoQcomFQ",
  authDomain: "snake-ultimate-by-soso.firebaseapp.com",
  projectId: "snake-ultimate-by-soso",
  storageBucket: "snake-ultimate-by-soso.firebasestorage.app",
  messagingSenderId: "342621367023",
  appId: "1:342621367023:web:bd16283003ce63584ec91a"
}

firebase.initializeApp(firebaseConfig)
const db = firebase.firestore()

/* ===== STATE ===== */
let currentUser = null
let userData = null
let sessionFruits = 0

let canvas = document.getElementById("canvas")
let ctx = canvas.getContext("2d")

let snake, food, dx, dy, score, interval
let gridSize = 20
let mode = "classic"
let level = 1
let levelGoal = 10
let snakeColor = "lime"
let isPaused = false
let isCountingDown = false  // bloque la pause pendant le countdown
let speedMultiplier = 1
const BASE_INTERVAL = 130

let nextDx, nextDy
let directionChanged = false

let colors = ["lime","cyan","orange","yellow","pink","purple","red","#00c3ff","gold","white"]

let appleImg = new Image(); appleImg.src = "apple.png"
let goldenAppleImg = new Image(); goldenAppleImg.src = "golden_apple.png"
let snakeHeadImg = new Image(); snakeHeadImg.src = "snake_head.png"
let phantomImg = new Image(); phantomImg.src = "phantom.png"
let clockImg = new Image(); clockImg.src = "clock.png"
let fruitRainImg = new Image(); fruitRainImg.src = "fruit_rain.png"
let starImg = new Image(); starImg.src = "star.png"
let diamondImg = new Image(); diamondImg.src = "diamond.png"
let sladImg = new Image(); sladImg.src = "salad.png"

/* ===== BONUS SYSTEM ===== */
let bonusOnMap = null
let bonusSpawnTimer = null
let bonusDespawnTimer = null
let extraFoods = []

let activeEffects = { phantom:false, clockFast:false, clockSlow:false, rain:false, star:false }
let effectTimers = {}
let effectCountdowns = {}
let effectCDIntervals = {}
let rainInterval = null

// Rareté : star = 1/9
const BONUS_POOL = ['phantom','phantom','clock','clock','clock','rain','rain','rain','star']
const BONUS_LABELS = { phantom:'👻 PHANTOM', clockFast:'⚡ RAPIDE', clockSlow:'🐢 LENT', rain:'🍎 PLUIE', star:'⭐ INVINCIBLE x2' }
const BONUS_CLASS  = { phantom:'b-phantom', clockFast:'b-clockFast', clockSlow:'b-clockSlow', rain:'b-rain', star:'b-star' }
const BONUS_COLORS = { phantom:'#a78bfa', clock:'#f97316', rain:'#34d399', star:'#ffd700' }

/* ===== NAVIGATION ===== */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'))
  document.getElementById(id).classList.remove('hidden')
}

/* ===== AUTH ===== */
async function register(){
  let user = document.getElementById("regUser").value.trim()
  let pass = document.getElementById("regPass").value
  let pass2 = document.getElementById("regPass2").value

  if(!user || user.length < 3){ setMsg("regMsg","Pseudo trop court (min 3 caractères)","error"); return }
  if(pass.length < 4){ setMsg("regMsg","Mot de passe trop court (min 4 caractères)","error"); return }
  if(pass !== pass2){ setMsg("regMsg","Les mots de passe ne correspondent pas","error"); return }
  if(/[^a-zA-Z0-9_-]/.test(user)){ setMsg("regMsg","Pseudo invalide (lettres, chiffres, _ - seulement)","error"); return }

  try{
    setMsg("regMsg","Vérification...","")
    let doc = await db.collection("users").doc(user).get()
    if(doc.exists){ setMsg("regMsg","Ce pseudo est déjà pris","error"); return }
    await db.collection("users").doc(user).set({
      password: pass, bestScore: 0, totalFruits: 0,
      levelsCompleted: 0, completedLevels: [], createdAt: Date.now()
    })
    currentUser = user
    await loadUserData()
    startApp()
  }catch(e){ setMsg("regMsg","Erreur : "+e.message,"error") }
}

async function login(){
  let user = document.getElementById("loginUser").value.trim()
  let pass = document.getElementById("loginPass").value
  if(!user || !pass){ setMsg("loginMsg","Remplis tous les champs","error"); return }
  try{
    setMsg("loginMsg","Connexion...","")
    let doc = await db.collection("users").doc(user).get()
    if(!doc.exists || doc.data().password !== pass){
      setMsg("loginMsg","Pseudo ou mot de passe incorrect","error"); return
    }
    currentUser = user
    userData = doc.data()
    if(!userData.completedLevels) userData.completedLevels = []
    startApp()
  }catch(e){ setMsg("loginMsg","Erreur : "+e.message,"error") }
}

function logout(){ currentUser = null; userData = null; showScreen('screenAuth') }

function setMsg(id, text, type){
  let el = document.getElementById(id)
  el.textContent = text
  el.className = "msg " + type
}

/* ===== DONNÉES USER ===== */
async function loadUserData(){
  if(!currentUser) return
  let doc = await db.collection("users").doc(currentUser).get()
  userData = doc.data()
  if(!userData.completedLevels) userData.completedLevels = []
}

function isLevelCompleted(lvl){
  if(!userData || !userData.completedLevels) return false
  return userData.completedLevels.includes(lvl)
}

async function saveData(levelCompleted){
  if(!currentUser || !userData) return
  try{
    let doc = await db.collection("users").doc(currentUser).get()
    let d = doc.data()
    let updateObj = {
      bestScore: Math.max(d.bestScore || 0, score),
      totalFruits: (d.totalFruits || 0) + sessionFruits,
    }
    if(levelCompleted){
      let arr = d.completedLevels || []
      if(!arr.includes(levelCompleted)) arr.push(levelCompleted)
      updateObj.completedLevels = arr
      updateObj.levelsCompleted = arr.length
    }
    await db.collection("users").doc(currentUser).update(updateObj)
    await loadUserData()
  }catch(e){ console.error("saveData:", e) }
}

/* ===== START APP ===== */
function startApp(){
  sessionFruits = 0
  updateBestScoreDisplay()
  showScreen('screenMenu')
}

function updateBestScoreDisplay(){
  let best = userData ? (userData.bestScore || 0) : 0
  document.getElementById("bestScore").innerText = "🏆 Meilleur score : " + best
  document.getElementById("bestInGame").innerText = best
}

/* ===== MENU AVENTURE ===== */
function updateAdventureUI(){
  let container = document.getElementById("levels")
  container.innerHTML = ""
  for(let i=1;i<=10;i++){
    let done = isLevelCompleted(i)
    let div = document.createElement("div")
    div.className = "level-card" + (done ? " completed" : "")
    div.innerHTML = `<div class="level-num">${done?"✅":"🔹"} Niveau ${i}</div><div class="level-goal">Objectif : ${i*10} pts</div>`
    div.onclick = () => startAdventure(i)
    container.appendChild(div)
  }
}

/* ===== JEU ===== */
function startClassic(){ mode = "classic"; startGame() }
function openAdventure(){ showScreen('screenAdventure'); updateAdventureUI() }
function startAdventure(lvl){ mode="adventure"; level=lvl; levelGoal=lvl*10; snakeColor=colors[lvl-1]; startGame() }

function startGame(){
  sessionFruits = 0
  isPaused = false
  speedMultiplier = 1
  clearAllBonuses()
  showScreen('screenGame')
  document.getElementById("pauseBtn").classList.remove("hidden")

  let obj = document.getElementById("objectiveTag")
  if(mode === "adventure"){
    obj.textContent = "NIVEAU "+level+" | OBJECTIF "+levelGoal
    obj.classList.remove("hidden")
  } else {
    obj.classList.add("hidden")
  }

  snake = [{x:200,y:200}]
  extraFoods = []
  bonusOnMap = null
  // Initialiser food simplement sans dépendre de randomFreeCell
  food = {x:100, y:100, type:'normal'}
  dx = gridSize; dy = 0
  nextDx = gridSize; nextDy = 0
  directionChanged = false
  score = 0

  document.getElementById("scoreDisplay").innerText = "0"
  document.getElementById("tailDisplay").innerText = "1"
  document.getElementById("bonusBar").innerHTML = ""
  canvas.className = ""
  updateBestScoreDisplay()
  clearInterval(interval)

  if(mode === "classic") scheduleBonusSpawn()

  startCountdown(() => {
    interval = setInterval(loop, getSpeed())
  })
}

/* ===== BONUS SPAWN ===== */
function scheduleBonusSpawn(){
  clearTimeout(bonusSpawnTimer)
  bonusSpawnTimer = setTimeout(()=>{
    if(!isPaused) spawnBonus()
    else scheduleBonusSpawn()
  }, 30000)
}

function spawnBonus(){
  if(bonusOnMap) return
  let type = BONUS_POOL[Math.floor(Math.random()*BONUS_POOL.length)]
  let pos = randomFreeCell()
  bonusOnMap = {x:pos.x, y:pos.y, type}
  bonusDespawnTimer = setTimeout(()=>{
    bonusOnMap = null
    scheduleBonusSpawn()
  }, 10000)
}

function clearAllBonuses(){
  clearTimeout(bonusSpawnTimer)
  clearTimeout(bonusDespawnTimer)
  bonusOnMap = null
  Object.keys(effectTimers).forEach(k => clearTimeout(effectTimers[k]))
  Object.keys(effectCDIntervals).forEach(k => clearInterval(effectCDIntervals[k]))
  effectTimers = {}; effectCountdowns = {}; effectCDIntervals = {}
  Object.keys(activeEffects).forEach(k => activeEffects[k] = false)
  clearInterval(rainInterval); rainInterval = null
  extraFoods = []
  document.getElementById("bonusBar").innerHTML = ""
  canvas.className = ""
}

/* ===== CELLULE LIBRE ===== */
function randomFreeCell(){
  let cols = 400/gridSize
  let rows = 400/gridSize
  let occ = [...snake, ...extraFoods]
  if(food) occ.push(food)
  if(bonusOnMap) occ.push(bonusOnMap)
  let pos
  let attempts = 0
  do {
    pos = {
      x: Math.floor(Math.random()*cols)*gridSize,
      y: Math.floor(Math.random()*rows)*gridSize
    }
    attempts++
  } while(attempts < 200 && occ.some(p => p.x===pos.x && p.y===pos.y))
  return pos
}

/* ===== AUTO-PAUSE SI CHANGEMENT D'ONGLET ===== */
document.addEventListener("visibilitychange", ()=>{
  if(document.hidden && !isCountingDown){
    let gameVisible = !document.getElementById("screenGame").classList.contains("hidden")
    if(gameVisible && !isPaused) pauseGame()
  }
})

function randomFood(){
  let cols = 400/gridSize
  let rows = 400/gridSize
  let occ = [...snake, ...extraFoods]
  if(bonusOnMap) occ.push(bonusOnMap)
  let pos
  let attempts = 0
  do {
    pos = {
      x: Math.floor(Math.random()*cols)*gridSize,
      y: Math.floor(Math.random()*rows)*gridSize
    }
    attempts++
  } while(attempts < 200 && occ.some(p => p.x===pos.x && p.y===pos.y))

  // Tirage du type de nourriture
  // 1/20 arc-en-ciel, 1/15 diamant, 1/8 salade, 1/10 dorée, reste normal
  let r = Math.random()
  if(r < 1/20)       return {x:pos.x, y:pos.y, type:'rainbow'}
  else if(r < 1/20 + 1/15) return {x:pos.x, y:pos.y, type:'diamond'}
  else if(r < 1/20 + 1/15 + 1/8)  return {x:pos.x, y:pos.y, type:'salad'}
  else if(r < 1/20 + 1/15 + 1/8 + 1/10) return {x:pos.x, y:pos.y, type:'gold'}
  else                return {x:pos.x, y:pos.y, type:'normal'}
}

/* ===== ACTIVER BONUS ===== */
function activateBonus(type){
  bonusOnMap = null
  clearTimeout(bonusDespawnTimer)
  scheduleBonusSpawn()
  if(type === 'clock'){
    applyEffect(Math.random()<0.25 ? 'clockFast' : 'clockSlow', 10)
    return
  }
  applyEffect(type, 10)
}

function applyEffect(name, sec){
  if(effectTimers[name]) clearTimeout(effectTimers[name])
  if(effectCDIntervals[name]) clearInterval(effectCDIntervals[name])

  if(name === 'clockFast'){ activeEffects.clockSlow=false; activeEffects.clockFast=true; restartLoop() }
  else if(name === 'clockSlow'){ activeEffects.clockFast=false; activeEffects.clockSlow=true; restartLoop() }
  else if(name === 'star'){ activeEffects.star=true; canvas.classList.add('star-active') }
  else activeEffects[name] = true

  effectCountdowns[name] = sec
  updateBonusBar()

  effectCDIntervals[name] = setInterval(()=>{
    effectCountdowns[name]--
    updateBonusBar()
    if(effectCountdowns[name] <= 0) clearInterval(effectCDIntervals[name])
  }, 1000)

  effectTimers[name] = setTimeout(()=>{
    activeEffects[name] = false
    if(name === 'star') canvas.classList.remove('star-active')
    if(name === 'clockFast' || name === 'clockSlow') restartLoop()
    if(name === 'rain'){ clearInterval(rainInterval); rainInterval = null }
    delete effectCountdowns[name]
    updateBonusBar()
  }, sec*1000)

  if(name === 'rain'){
    rainInterval = setInterval(()=>{
      if(extraFoods.length < 10){
        let p = randomFreeCell()
        extraFoods.push({x:p.x, y:p.y, gold:Math.random()<0.2})
      }
    }, 1000)
  }
}

function getSpeed(){
  let s = BASE_INTERVAL
  if(activeEffects.clockFast) s = Math.round(BASE_INTERVAL / 1.5)
  if(activeEffects.clockSlow) s = Math.round(BASE_INTERVAL / 0.5)
  return Math.max(30, Math.round(s / speedMultiplier))
}

function restartLoop(){
  clearInterval(interval)
  interval = setInterval(loop, getSpeed())
}

function updateBonusBar(){
  let bar = document.getElementById("bonusBar")
  bar.innerHTML = ""
  Object.keys(effectCountdowns).forEach(name => {
    if(!activeEffects[name]) return
    let d = document.createElement("div")
    d.className = "bonus-ind " + BONUS_CLASS[name]
    d.innerHTML = `${BONUS_LABELS[name]} <span class="btimer">${effectCountdowns[name]}s</span>`
    bar.appendChild(d)
  })
}

/* ===== COUNTDOWN ===== */
function startCountdown(callback){
  let overlay = document.getElementById("countdownOverlay")
  let numEl = document.getElementById("countdownNumber")
  overlay.classList.remove("hidden")
  isCountingDown = true
  let count = 3
  numEl.textContent = count
  let timer = setInterval(()=>{
    count--
    if(count === 0){
      numEl.textContent = "GO !"
      numEl.style.color = "var(--neon-gold)"
      numEl.style.textShadow = "0 0 40px var(--neon-gold)"
    } else if(count < 0){
      clearInterval(timer)
      overlay.classList.add("hidden")
      numEl.style.color = "var(--neon-green)"
      numEl.style.textShadow = "0 0 40px var(--neon-green)"
      isCountingDown = false
      callback()
    } else {
      numEl.style.animation = "none"
      numEl.offsetHeight
      numEl.style.animation = "cdPop 0.4s ease"
      numEl.textContent = count
    }
  }, 900)
}

/* ===== PAUSE ===== */
function togglePause(){ if(isPaused) resumeGame(); else pauseGame() }

function pauseGame(){
  if(isPaused || isCountingDown) return  // bloqué pendant countdown
  isPaused = true
  clearInterval(interval)
  // Pause tous les timers de bonus (on sauvegarde le temps restant via effectCountdowns)
  clearInterval(rainInterval)
  // Pause le despawn du bonus sur la map
  clearTimeout(bonusDespawnTimer)
  // Pause les countdowns d'effets
  Object.keys(effectCDIntervals).forEach(k => clearInterval(effectCDIntervals[k]))
  document.getElementById("pauseOverlay").classList.remove("hidden")
}

function resumeGame(){
  document.getElementById("pauseOverlay").classList.add("hidden")
  isPaused = false
  // Relancer les countdowns d'effets actifs avec le temps restant
  Object.keys(effectCountdowns).forEach(name => {
    if(!activeEffects[name]) return
    effectCDIntervals[name] = setInterval(()=>{
      effectCountdowns[name]--
      updateBonusBar()
      if(effectCountdowns[name] <= 0) clearInterval(effectCDIntervals[name])
    }, 1000)
  })
  // Relancer la pluie si active
  if(activeEffects.rain && !rainInterval){
    rainInterval = setInterval(()=>{
      if(extraFoods.length < 10){
        let p = randomFreeCell()
        extraFoods.push({x:p.x, y:p.y, gold:Math.random()<0.2})
      }
    }, 1000)
  }
  // Relancer le despawn du bonus sur la map avec le temps restant approximatif
  if(bonusOnMap){
    bonusDespawnTimer = setTimeout(()=>{
      bonusOnMap = null
      scheduleBonusSpawn()
    }, (effectCountdowns['_bonusMap'] || 5) * 1000)
  }
  startCountdown(()=>{ interval = setInterval(loop, getSpeed()) })
}

function quitToMenu(){
  clearInterval(interval)
  clearAllBonuses()
  isPaused = false
  document.getElementById("pauseOverlay").classList.add("hidden")
  document.getElementById("pauseBtn").classList.add("hidden")
  document.getElementById("countdownOverlay").classList.add("hidden")
  showScreen('screenMenu')
  loadUserData().then(updateBestScoreDisplay)
}

/* ===== CONTROLS ===== */
document.addEventListener("keydown", e => {
  if(e.key === "Escape"){
    if(isCountingDown) return  // pas de pause pendant countdown
    let gameVisible = !document.getElementById("screenGame").classList.contains("hidden")
    if(gameVisible) togglePause()
    return
  }
  handleDirection(e.key)
})

function handleDirection(key){
  if(isPaused) return
  if((key==="ArrowUp"||key==="w") && dy===0 && nextDy===0){ nextDx=0; nextDy=-gridSize }
  if((key==="ArrowDown"||key==="s") && dy===0 && nextDy===0){ nextDx=0; nextDy=gridSize }
  if((key==="ArrowLeft"||key==="a") && dx===0 && nextDx===0){ nextDx=-gridSize; nextDy=0 }
  if((key==="ArrowRight"||key==="d") && dx===0 && nextDx===0){ nextDx=gridSize; nextDy=0 }
}

function mobileDir(dir){
  if(isPaused) return
  if(dir==="up" && dy===0 && nextDy===0){ nextDx=0; nextDy=-gridSize }
  if(dir==="down" && dy===0 && nextDy===0){ nextDx=0; nextDy=gridSize }
  if(dir==="left" && dx===0 && nextDx===0){ nextDx=-gridSize; nextDy=0 }
  if(dir==="right" && dx===0 && nextDx===0){ nextDx=gridSize; nextDy=0 }
}

let startX=0, startY=0
canvas.addEventListener("touchstart", e=>{startX=e.touches[0].clientX;startY=e.touches[0].clientY},{passive:true})
canvas.addEventListener("touchend", e=>{
  if(isPaused) return
  let diffX = e.changedTouches[0].clientX - startX
  let diffY = e.changedTouches[0].clientY - startY
  if(Math.abs(diffX)>Math.abs(diffY)){
    if(diffX>0 && dx===0 && nextDx===0){nextDx=gridSize;nextDy=0}
    else if(diffX<0 && dx===0 && nextDx===0){nextDx=-gridSize;nextDy=0}
  }else{
    if(diffY>0 && dy===0 && nextDy===0){nextDx=0;nextDy=gridSize}
    else if(diffY<0 && dy===0 && nextDy===0){nextDx=0;nextDy=-gridSize}
  }
},{passive:true})

/* ===== LOOP ===== */
function loop(){
  dx = nextDx; dy = nextDy
  directionChanged = false

  let head = {x:snake[0].x+dx, y:snake[0].y+dy}
  let canPhase = activeEffects.phantom || activeEffects.star

  // Murs
  if(head.x<0||head.x>=400||head.y<0||head.y>=400){
    if(canPhase){
      if(head.x<0) head.x=400-gridSize
      else if(head.x>=400) head.x=0
      if(head.y<0) head.y=400-gridSize
      else if(head.y>=400) head.y=0
    } else { gameOver(); return }
  }

  // Collision queue
  for(let i=1; i<snake.length; i++){
    if(head.x===snake[i].x && head.y===snake[i].y){
      if(!canPhase){ gameOver(); return }
    }
  }

  snake.unshift(head)
  let ate = false

  // Nourriture principale
  if(head.x===food.x && head.y===food.y){
    let pts = getFoodPts(food) * (activeEffects.star ? 2 : 1)
    score += pts; sessionFruits += pts
    // Salade : réduit la queue
    if(food.type === 'salad' && snake.length > 1) snake.pop()
    food = randomFood()
    ate = true
  }

  // Extra foods (pluie de pommes)
  for(let i=extraFoods.length-1; i>=0; i--){
    let ef = extraFoods[i]
    if(head.x===ef.x && head.y===ef.y){
      let pts = getFoodPts(ef) * (activeEffects.star ? 2 : 1)
      score += pts; sessionFruits += pts
      extraFoods.splice(i,1)
      ate = true
    }
  }

  // Ramasser un bonus
  if(bonusOnMap && head.x===bonusOnMap.x && head.y===bonusOnMap.y){
    activateBonus(bonusOnMap.type)
  }

  if(!ate) snake.pop()

  // Affichages
  document.getElementById("scoreDisplay").innerText = score
  document.getElementById("tailDisplay").innerText = snake.length
  let best = userData ? (userData.bestScore || 0) : 0
  if(score > best) document.getElementById("bestInGame").innerText = score

  // Couleur classique
  if(mode==="classic" && !activeEffects.star)
    snakeColor = colors[Math.floor(score/10)%colors.length]

  // Win aventure
  if(mode==="adventure" && score>=levelGoal){ winLevel(); return }

  // Reset queue à 100
  if(snake.length >= 100) resetSnake()

  draw()
}

/* ===== POINTS PAR NOURRITURE ===== */
function getFoodPts(f){
  if(f.type==='gold')    return 3
  if(f.type==='diamond') return 5
  if(f.type==='rainbow') return 10
  if(f.type==='salad')   return 1
  return 1  // normal
}

/* ===== RESET QUEUE 100 ===== */
function resetSnake(){
  let hx = snake[0].x, hy = snake[0].y
  snake = [{x:hx, y:hy}]
  speedMultiplier *= 1.5
  canvas.classList.remove('reset-flash')
  void canvas.offsetWidth
  canvas.classList.add('reset-flash')
  setTimeout(()=>canvas.classList.remove('reset-flash'), 1200)
  restartLoop()
}

/* ===== DESSIN ===== */
function draw(){
  ctx.fillStyle="#0a0f0a"
  ctx.fillRect(0,0,400,400)

  ctx.strokeStyle = "rgba(0,255,136,0.03)"
  ctx.lineWidth = 1
  for(let x=0;x<400;x+=gridSize){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,400);ctx.stroke()}
  for(let y=0;y<400;y+=gridSize){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(400,y);ctx.stroke()}

  // Nourriture principale
  drawFood(food)
  // Extra foods
  extraFoods.forEach(f => drawFood(f))
  // Bonus sur la map
  if(bonusOnMap) drawBonusItem(bonusOnMap)

  // Couleur arc-en-ciel si star actif
  if(activeEffects.star) snakeColor = `hsl(${(Date.now()/5)%360},100%,60%)`

  // Serpent
  snake.forEach((p,i)=>{
    if(i===0){
      ctx.fillStyle = snakeColor
      ctx.fillRect(p.x,p.y,gridSize,gridSize)
      try{ctx.drawImage(snakeHeadImg,p.x,p.y,gridSize,gridSize)}catch{}
    }else{
      let alpha = Math.max(0.4, 1 - i/snake.length * 0.6)
      ctx.globalAlpha = alpha
      ctx.fillStyle = snakeColor
      ctx.fillRect(p.x+1,p.y+1,gridSize-2,gridSize-2)
      ctx.globalAlpha = 1
    }
  })

  // Texte INVINCIBLE x2 si star actif
  if(activeEffects.star){
    ctx.save()
    ctx.font = "bold 11px 'Orbitron',monospace"
    ctx.textAlign = "center"
    ctx.fillStyle = `hsl(${(Date.now()/3)%360},100%,70%)`
    ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = 12
    ctx.fillText("✦ INVINCIBLE & x2 FRUITS ✦", 200, 18)
    ctx.restore()
  }
}

function drawFood(f){
  if(f.type === 'rainbow'){
    // Arc-en-ciel animé pur canvas - pas besoin d'image
    let t = Date.now() / 300
    let grad = ctx.createLinearGradient(f.x, f.y, f.x+gridSize, f.y+gridSize)
    grad.addColorStop(0,   `hsl(${(t*60)%360},100%,60%)`)
    grad.addColorStop(0.33,`hsl(${(t*60+120)%360},100%,60%)`)
    grad.addColorStop(0.66,`hsl(${(t*60+240)%360},100%,60%)`)
    grad.addColorStop(1,   `hsl(${(t*60+360)%360},100%,60%)`)
    ctx.fillStyle = grad
    ctx.beginPath()
    ctx.roundRect(f.x+1, f.y+1, gridSize-2, gridSize-2, 4)
    ctx.fill()
    // Brillance pulsée
    ctx.save()
    ctx.globalAlpha = 0.4 + 0.3*Math.sin(Date.now()/150)
    ctx.fillStyle = 'white'
    ctx.beginPath()
    ctx.arc(f.x+gridSize*0.3, f.y+gridSize*0.3, 2, 0, Math.PI*2)
    ctx.fill()
    ctx.restore()
  } else if(f.type === 'diamond'){
    try{ ctx.drawImage(diamondImg, f.x, f.y, gridSize, gridSize) }
    catch{
      // Fallback : losange cyan
      ctx.fillStyle = '#00eeff'
      ctx.save()
      ctx.translate(f.x+gridSize/2, f.y+gridSize/2)
      ctx.rotate(Math.PI/4)
      ctx.fillRect(-gridSize*0.35, -gridSize*0.35, gridSize*0.7, gridSize*0.7)
      ctx.restore()
    }
  } else if(f.type === 'salad'){
    try{ ctx.drawImage(sladImg, f.x, f.y, gridSize, gridSize) }
    catch{
      // Fallback : carré vert salade
      ctx.fillStyle = '#7ec850'
      ctx.fillRect(f.x+1, f.y+1, gridSize-2, gridSize-2)
    }
  } else if(f.type === 'gold'){
    try{ ctx.drawImage(goldenAppleImg, f.x, f.y, gridSize, gridSize) }
    catch{ ctx.fillStyle='gold'; ctx.fillRect(f.x,f.y,gridSize,gridSize) }
  } else {
    // normal (et fallback pour extra foods sans type)
    let isGold = f.gold === true
    try{ ctx.drawImage(isGold ? goldenAppleImg : appleImg, f.x, f.y, gridSize, gridSize) }
    catch{ ctx.fillStyle=isGold?"gold":"#ff4444"; ctx.fillRect(f.x,f.y,gridSize,gridSize) }
  }
}

function drawBonusItem(b){
  let img = b.type==='phantom' ? phantomImg : b.type==='clock' ? clockImg : b.type==='rain' ? fruitRainImg : starImg
  let col = BONUS_COLORS[b.type] || 'white'
  try{ ctx.drawImage(img, b.x, b.y, gridSize, gridSize) }
  catch{ ctx.fillStyle=col; ctx.fillRect(b.x,b.y,gridSize,gridSize) }
  // Lueur pulsée autour du bonus
  ctx.save()
  ctx.strokeStyle = col
  ctx.globalAlpha = 0.35 + 0.3*Math.sin(Date.now()/200)
  ctx.lineWidth = 2
  ctx.strokeRect(b.x-1, b.y-1, gridSize+2, gridSize+2)
  ctx.restore()
}

/* ===== GAME OVER / WIN ===== */
async function gameOver(){
  clearInterval(interval)
  clearAllBonuses()
  document.getElementById("pauseBtn").classList.add("hidden")
  await saveData(null)
  let best = userData ? (userData.bestScore || 0) : 0
  document.getElementById("goScore").innerText = "Score : " + score
  document.getElementById("goSub").innerText = score > best ? "🎉 Nouveau record !" : "Meilleur : " + Math.max(best, score)
  showScreen('screenGameover')
}

async function winLevel(){
  clearInterval(interval)
  clearAllBonuses()
  document.getElementById("pauseBtn").classList.add("hidden")
  await saveData(level)
  document.getElementById("winScore").innerText = "Score : " + score
  document.getElementById("winSub").innerText = "Niveau " + level + " complété !"
  showScreen('screenWin')
}

function nextLevel(){
  level++
  if(level>10){ goToMenu(); return }
  startAdventure(level)
}

function restartLevel(){
  if(mode==="adventure") startAdventure(level)
  else startClassic()
}

/* ===== RETOUR MENU ===== */
function goToMenu(){
  clearInterval(interval)
  clearAllBonuses()
  isPaused = false
  document.getElementById("pauseBtn").classList.add("hidden")
  document.getElementById("pauseOverlay").classList.add("hidden")
  document.getElementById("countdownOverlay").classList.add("hidden")
  showScreen('screenMenu')
  loadUserData().then(updateBestScoreDisplay)
}

/* ===== LEADERBOARD ===== */
async function showLeaderboard(){
  showScreen('screenLeaderboard')
  let list = document.getElementById("leaderboardList")
  list.innerHTML = '<div style="font-size:10px;color:rgba(255,255,255,0.4)">Chargement...</div>'
  try{
    let snap = await db.collection("users").orderBy("bestScore","desc").limit(10).get()
    list.innerHTML = ""
    let rank = 1
    let medals = ["🥇","🥈","🥉"]
    snap.forEach(doc=>{
      let d = doc.data()
      let div = document.createElement("div")
      div.className = "lb-entry" + (rank<=3?" rank-"+rank:"") + (doc.id===currentUser?" me":"")
      div.innerHTML = `
        <div class="lb-rank">${medals[rank-1]||rank}</div>
        <div class="lb-name">${doc.id}${doc.id===currentUser?' <span style="font-size:8px;color:var(--neon-blue)">(moi)</span>':''}</div>
        <div class="lb-score">${d.bestScore}</div>
      `
      list.appendChild(div)
      rank++
    })
    if(snap.empty) list.innerHTML = '<div style="font-size:10px;color:rgba(255,255,255,0.3)">Aucun score enregistré</div>'
  }catch(e){
    list.innerHTML = '<div style="color:var(--neon-pink);font-size:10px">Erreur de chargement</div>'
  }
}

/* ===== PROFIL ===== */
async function showProfile(){
  showScreen('screenProfile')
  if(!userData) await loadUserData()
  document.getElementById("profileName").innerText = currentUser
  document.getElementById("profileBest").innerText = userData.bestScore || 0
  document.getElementById("profileFruits").innerText = userData.totalFruits || 0
  document.getElementById("profileLevels").innerText = (userData.completedLevels || []).length
  try{
    let snap = await db.collection("users").orderBy("bestScore","desc").get()
    let rank = 1
    snap.forEach(doc=>{ if(doc.id!==currentUser && doc.data().bestScore > (userData.bestScore||0)) rank++ })
    document.getElementById("profileRank").innerText = "Classement mondial : #" + rank
  }catch{}
}

/* ===== INIT ===== */
window.addEventListener("load", ()=>{
  setTimeout(()=>{
    document.getElementById("loading").classList.add("hidden")
    showScreen("screenAuth")
  }, 1000)
})
