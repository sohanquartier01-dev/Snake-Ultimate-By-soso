<!DOCTYPE html>
<html>
<head>
<title>Snake Ultimate</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
background:linear-gradient(270deg,#0f2027,#203a43,#2c5364);
background-size:600% 600%;
animation:bg 10s ease infinite;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
margin:0;
}
@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}
canvas{
background:#111;
border:4px solid white;
margin-top:20px;
max-width:90vw;
max-height:60vh;
}
button{
padding:12px 25px;
font-size:18px;
margin:10px;
cursor:pointer;
border:none;
border-radius:8px;
background:#00c3ff;
color:white;
}
.level{padding:6px;margin:4px;}
.completed{color:lime;font-weight:bold;}
#snakeTitle{font-size:60px;}
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth">
<h1>🐍 Snake Ultimate</h1>
<input id="username" placeholder="Pseudo">
<br>
<input id="password" type="password">
<br>
<button onclick="register()">Créer compte</button>
<button onclick="showLogin()">Login</button>
<p id="authMsg"></p>
</div>

<div id="login" style="display:none">
<h1>Connexion</h1>
<input id="loginUser">
<br>
<input id="loginPass" type="password">
<br>
<button onclick="login()">Connexion</button>
<button onclick="showRegister()">Retour</button>
</div>

<!-- MENU -->
<div id="menu" style="display:none">
<h1 id="snakeTitle">🐍 Snake Ultimate</h1>
<h2 id="bestScore">Meilleur score : 0</h2>
<button onclick="startClassic()">Mode Classique</button>
<button onclick="openAdventure()">Mode aventure</button>
<button onclick="showLeaderboard()">Classement</button>
</div>

<!-- LEADERBOARD -->
<div id="leaderboard" style="display:none">
<h1>🌍 Classement</h1>
<div id="leaderboardList"></div>
<button onclick="backToMenu()">Retour</button>
</div>

<!-- GAME -->
<div id="game" style="display:none">
<h2 id="score">Score : 0</h2>
<canvas id="canvas" width="400" height="400"></canvas>
</div>

<div id="gameover" style="display:none">
<h1>Game Over</h1>
<button onclick="restartLevel()">Rejouer</button>
<button onclick="backToMenu()">Menu</button>
</div>

<script>

/* FIREBASE */
const firebaseConfig = {
apiKey:"AIza...",
authDomain:"snake-ultimate-by-soso.firebaseapp.com",
projectId:"snake-ultimate-by-soso"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

/* VARIABLES */
let currentUser=null
let totalFruits=0
let startTime=Date.now()

/* AUTH */
function showLogin(){
auth.style.display="none"
login.style.display="block"
}

function showRegister(){
login.style.display="none"
auth.style.display="block"
}

async function register(){
let user=username.value
let pass=password.value

let doc=await db.collection("users").doc(user).get()
if(doc.exists){authMsg.innerText="Pris";return}

await db.collection("users").doc(user).set({
password:pass,
bestScore:0,
fruits:0,
time:0
})

currentUser=user
startApp()
}

async function login(){
let user=loginUser.value
let pass=loginPass.value

let doc=await db.collection("users").doc(user).get()
if(!doc.exists||doc.data().password!==pass){return}

currentUser=user
startApp()
}

function startApp(){
auth.style.display="none"
login.style.display="none"
menu.style.display="block"
}

/* SAVE */
async function saveData(){
if(!currentUser)return
let doc=await db.collection("users").doc(currentUser).get()
let d=doc.data()

await db.collection("users").doc(currentUser).update({
bestScore:Math.max(d.bestScore,score),
fruits:d.fruits+totalFruits,
time:d.time+Math.floor((Date.now()-startTime)/1000)
})
}

/* LEADERBOARD */
async function showLeaderboard(){
menu.style.display="none"
leaderboard.style.display="block"

let snap=await db.collection("users")
.orderBy("bestScore","desc")
.limit(10)
.get()

leaderboardList.innerHTML=""
snap.forEach(doc=>{
let d=doc.data()
leaderboardList.innerHTML+=`<p>${doc.id} - ${d.bestScore}</p>`
})
}

/* TON JEU (INCHANGÉ) */

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

let snake
let food
let dx
let dy
let score
let interval

let gridSize=20

function startClassic(){
startGame()
}

function startGame(){
menu.style.display="none"
game.style.display="block"

snake=[{x:200,y:200}]
food={x:100,y:100}
dx=20;dy=0;score=0

interval=setInterval(loop,130)
}

document.addEventListener("keydown",e=>{
if(e.key==="ArrowUp"){dx=0;dy=-20}
if(e.key==="ArrowDown"){dx=0;dy=20}
if(e.key==="ArrowLeft"){dx=-20;dy=0}
if(e.key==="ArrowRight"){dx=20;dy=0}
})

function loop(){
let head={x:snake[0].x+dx,y:snake[0].y+dy}

if(head.x<0||head.y<0||head.x>=400||head.y>=400){
gameOver();return
}

snake.unshift(head)

if(head.x===food.x&&head.y===food.y){
score++
food={x:Math.random()*400,y:Math.random()*400}
}else{
snake.pop()
}

ctx.fillRect(0,0,400,400)
snake.forEach(p=>ctx.fillRect(p.x,p.y,20,20))
}

function gameOver(){
clearInterval(interval)
saveData()
game.style.display="none"
gameover.style.display="block"
}

function restartLevel(){
gameover.style.display="none"
startGame()
}

function backToMenu(){
leaderboard.style.display="none"
gameover.style.display="none"
game.style.display="none"
menu.style.display="block"
}

</script>

</body>
</html>
