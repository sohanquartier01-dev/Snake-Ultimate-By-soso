<!DOCTYPE html>
<html>
<head>
<title>Snake Ultimate</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
background:linear-gradient(270deg,#0f2027,#203a43,#2c5364);
background-size:600% 600%;
animation:bg 10s ease infinite;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
margin:0;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

canvas{
background:#111;
border:4px solid white;
margin-top:20px;
max-width:90vw;
max-height:60vh;
}

button{
padding:12px 25px;
font-size:18px;
margin:10px;
cursor:pointer;
border:none;
border-radius:8px;
background:#00c3ff;
color:white;
transition:0.2s;
}

button:hover{
transform:scale(1.1);
background:#00ffa6;
}

.level{
padding:6px;
margin:4px;
}

.completed{
color:lime;
font-weight:bold;
}

#snakeTitle{
font-size:60px;
animation:float 2s infinite alternate;
}

@keyframes float{
from{transform:translateY(0px)}
to{transform:translateY(-10px)}
}

#mobileControls{
margin-top:15px;
display:none;
}

#mobileControls button{
font-size:28px;
padding:15px 20px;
margin:5px;
}

@media (max-width:768px){
#mobileControls{
display:block;
}
}

</style>

</head>

<body>

<div id="menu">

<h1 id="snakeTitle">🐍 Snake Ultimate</h1>

<h2 id="bestScore">Meilleur score : 0</h2>

<button onclick="startClassic()">Mode Classique</button>
<button onclick="openAdventure()">Mode aventure</button>

</div>

<div id="adventureMenu" style="display:none">

<h1>Mode aventure</h1>

<div id="levels"></div>

<button onclick="backToMenu()">Retour</button>

</div>

<div id="game" style="display:none">

<h2 id="score">Score : 0</h2>
<p id="objective"></p>

<canvas id="canvas" width="400" height="400"></canvas>

<div id="mobileControls">

<button onclick="mobileDir('up')">⬆️</button>
<br>
<button onclick="mobileDir('left')">⬅️</button>
<button onclick="mobileDir('down')">⬇️</button>
<button onclick="mobileDir('right')">➡️</button>

</div>

</div>

<div id="gameover" style="display:none">

<h1>💀 Game Over</h1>

<button onclick="restartLevel()">Rejouer</button>
<button onclick="backToMenu()">Retour au lobby</button>

</div>

<div id="win" style="display:none">

<h1>🏆 Niveau terminé</h1>

<button onclick="nextLevel()">Niveau suivant</button>
<button onclick="backToMenu()">Retour au lobby</button>

</div>

<script>

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

let snake
let food
let dx
let dy
let score
let interval

let gridSize = 20 /* FIX taille case */

let mode="classic"

let level=1
let levelGoal=10

let snakeColor="lime"

let colors=[
"lime","cyan","orange","yellow","pink",
"purple","red","blue","gold","white"
]

/* IMAGES */
let appleImg = new Image()
appleImg.src = "apple.png"

let goldenAppleImg = new Image()
goldenAppleImg.src = "golden_apple.png"

let snakeHeadImg = new Image()
snakeHeadImg.src = "snake_head.png"

let bestScore=localStorage.getItem("snakeBest")||0
document.getElementById("bestScore").innerText="Meilleur score : "+bestScore

function startClassic(){
mode="classic"
startGame()
}

function openAdventure(){
document.getElementById("menu").style.display="none"
document.getElementById("adventureMenu").style.display="block"
updateAdventureUI()
}

function updateAdventureUI(){

let container=document.getElementById("levels")
container.innerHTML=""

for(let i=1;i<=10;i++){

let div=document.createElement("div")
div.className="level"

let goal=i*10

if(localStorage.getItem("level"+i)){
div.classList.add("completed")
}

div.innerText="Niveau "+i+" - Score requis : "+goal
div.onclick=()=>startAdventure(i)

container.appendChild(div)

}

}

function startAdventure(lvl){

mode="adventure"
level=lvl
levelGoal=lvl*10
snakeColor=colors[lvl-1]

startGame()

}

function startGame(){

document.getElementById("menu").style.display="none"
document.getElementById("adventureMenu").style.display="none"
document.getElementById("gameover").style.display="none"
document.getElementById("win").style.display="none"

document.getElementById("game").style.display="block"

snake=[{x:200,y:200}]
food=randomFood()

dx=gridSize
dy=0
score=0

document.getElementById("score").innerText="Score : 0"

if(mode=="adventure"){
document.getElementById("objective").innerText="Niveau "+level+" | Objectif : "+levelGoal
}else{
document.getElementById("objective").innerText=""
}

interval=setInterval(loop,130)

}

function randomFood(){
return{
x:Math.floor(Math.random()*(400/gridSize))*gridSize,
y:Math.floor(Math.random()*(400/gridSize))*gridSize,
gold:Math.random()<0.1
}
}

/* CONTROLES */

document.addEventListener("keydown",direction)

function direction(e){

if((e.key==="ArrowUp"||e.key==="w") && dy===0){dx=0;dy=-gridSize}
if((e.key==="ArrowDown"||e.key==="s") && dy===0){dx=0;dy=gridSize}
if((e.key==="ArrowLeft"||e.key==="a") && dx===0){dx=-gridSize;dy=0}
if((e.key==="ArrowRight"||e.key==="d") && dx===0){dx=gridSize;dy=0}

}

function mobileDir(dir){

if(dir==="up" && dy===0){dx=0;dy=-gridSize}
if(dir==="down" && dy===0){dx=0;dy=gridSize}
if(dir==="left" && dx===0){dx=-gridSize;dy=0}
if(dir==="right" && dx===0){dx=gridSize;dy=0}

}

/* SWIPE reste pareil */

let startX=0
let startY=0

canvas.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
startY=e.touches[0].clientY
})

canvas.addEventListener("touchend",e=>{

let endX=e.changedTouches[0].clientX
let endY=e.changedTouches[0].clientY

let diffX=endX-startX
let diffY=endY-startY

if(Math.abs(diffX)>Math.abs(diffY)){

if(diffX>0 && dx===0){dx=gridSize;dy=0}
else if(diffX<0 && dx===0){dx=-gridSize;dy=0}

}else{

if(diffY>0 && dy===0){dx=0;dy=gridSize}
else if(diffY<0 && dy===0){dx=0;dy=-gridSize}

}

})

function loop(){

let head={
x:snake[0].x+dx,
y:snake[0].y+dy
}

if(head.x<0||head.y<0||head.x>=400||head.y>=400){
gameOver()
return
}

for(let part of snake){
if(head.x===part.x && head.y===part.y){
gameOver()
return
}
}

snake.unshift(head)

if(head.x===food.x && head.y===food.y){

if(food.gold){
score+=3
}else{
score++
}

document.getElementById("score").innerText="Score : "+score

food=randomFood()

if(score>bestScore){
bestScore=score
localStorage.setItem("snakeBest",bestScore)
document.getElementById("bestScore").innerText="Meilleur score : "+bestScore
}

if(mode=="classic"){
snakeColor=colors[Math.floor(score/10)%colors.length]
}

if(mode=="adventure" && score>=levelGoal){
winLevel()
return
}

}else{
snake.pop()
}

/* FOND */
ctx.fillStyle="#111"
ctx.fillRect(0,0,400,400)

/* ❌ GRILLE SUPPRIMÉE */

/* POMME */
if(food.gold){
ctx.drawImage(goldenAppleImg,food.x,food.y,gridSize,gridSize)
}else{
ctx.drawImage(appleImg,food.x,food.y,gridSize,gridSize)
}

/* SERPENT */
snake.forEach((p,i)=>{
if(i==0){
ctx.drawImage(snakeHeadImg,p.x,p.y,gridSize,gridSize)
}else{
ctx.fillStyle=snakeColor
ctx.fillRect(p.x,p.y,gridSize,gridSize)
}
})

}

function gameOver(){
clearInterval(interval)
document.getElementById("game").style.display="none"
document.getElementById("gameover").style.display="block"
}

function winLevel(){
clearInterval(interval)
localStorage.setItem("level"+level,true)
document.getElementById("game").style.display="none"
document.getElementById("win").style.display="block"
}

function nextLevel(){

level++

if(level>10){
backToMenu()
return
}

startAdventure(level)

}

function restartLevel(){

document.getElementById("gameover").style.display="none"

if(mode=="adventure"){
startAdventure(level)
}else{
startClassic()
}

}

function backToMenu(){

document.getElementById("game").style.display="none"
document.getElementById("gameover").style.display="none"
document.getElementById("win").style.display="none"
document.getElementById("adventureMenu").style.display="none"

document.getElementById("menu").style.display="block"

updateAdventureUI()

}

</script>

</body>
</html>
