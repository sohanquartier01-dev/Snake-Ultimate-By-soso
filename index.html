<!DOCTYPE html>
<html>
<head>
<title>Snake Ultimate</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
/* TON STYLE ORIGINAL (100% intact) */
body{
background:linear-gradient(270deg,#0f2027,#203a43,#2c5364);
background-size:600% 600%;
animation:bg 10s ease infinite;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
margin:0;
}
@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}
canvas{
background:#111;
border:4px solid white;
margin-top:20px;
max-width:90vw;
max-height:60vh;
}
button{
padding:12px 25px;
font-size:18px;
margin:10px;
cursor:pointer;
border:none;
border-radius:8px;
background:#00c3ff;
color:white;
transition:0.2s;
}
button:hover{
transform:scale(1.1);
background:#00ffa6;
}
.level{padding:6px;margin:4px;}
.completed{color:lime;font-weight:bold;}
#snakeTitle{font-size:60px;animation:float 2s infinite alternate;}
@keyframes float{from{transform:translateY(0)}to{transform:translateY(-10px)}}
#mobileControls{margin-top:15px;display:none;}
#mobileControls button{font-size:28px;padding:15px 20px;margin:5px;}
@media (max-width:768px){#mobileControls{display:block;}}
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth">
<h1>🐍 Snake Ultimate</h1>

<p>Pseudo (1-12 caractères)</p>
<input id="username"><br>

<p>Mot de passe (1-50 caractères)</p>
<input id="password" type="password"><br>

<button onclick="register()">Créer compte</button>
<button onclick="showLogin()">Se connecter</button>

<p id="authMsg"></p>
</div>

<div id="login" style="display:none">
<h1>Connexion</h1>
<input id="loginUser"><br>
<input id="loginPass" type="password"><br>
<button onclick="login()">Connexion</button>
<button onclick="showRegister()">Retour</button>
<p id="loginMsg"></p>
</div>

<!-- MENU ORIGINAL -->
<div id="menu" style="display:none">
<h1 id="snakeTitle">🐍 Snake Ultimate</h1>
<h2 id="bestScore">Meilleur score : 0</h2>

<button onclick="startClassic()">Mode Classique</button>
<button onclick="openAdventure()">Mode aventure</button>
<button onclick="showLeaderboard()">Classement</button>
<button onclick="showProfile()">Profil</button>
</div>

<!-- PROFIL -->
<div id="profile" style="display:none">
<h1>👤 Profil</h1>
<p id="profileName"></p>
<p id="profileStats"></p>

<button onclick="logout()">Se déconnecter</button>
<button onclick="backToMenu()">Retour</button>
</div>

<!-- LEADERBOARD -->
<div id="leaderboard" style="display:none">
<h1>🌍 Classement</h1>
<div id="leaderboardList"></div>
<button onclick="backToMenu()">Retour</button>
</div>

  <!-- TON JEU ORIGINAL (100% intact) -->
<div id="adventureMenu" style="display:none">
<h1>Mode aventure</h1>
<div id="levels"></div>
<button onclick="backToMenu()">Retour</button>
</div>

<div id="game" style="display:none">
<h2 id="score">Score : 0</h2>
<p id="objective"></p>
<canvas id="canvas" width="400" height="400"></canvas>

<div id="mobileControls">
<button onclick="mobileDir('up')">⬆️</button><br>
<button onclick="mobileDir('left')">⬅️</button>
<button onclick="mobileDir('down')">⬇️</button>
<button onclick="mobileDir('right')">➡️</button>
</div>
</div>

<div id="gameover" style="display:none">
<h1>💀 Game Over</h1>
<button onclick="restartLevel()">Rejouer</button>
<button onclick="backToMenu()">Retour</button>
</div>

<div id="win" style="display:none">
<h1>🏆 Niveau terminé</h1>
<button onclick="nextLevel()">Niveau suivant</button>
<button onclick="backToMenu()">Retour</button>
</div>

<script>

/* FIREBASE */
const firebaseConfig = {
apiKey:"AIzaSyDdzcbtAwYXDPfM1RAOk3YzzDfRoQcomFQ",
authDomain:"snake-ultimate-by-soso.firebaseapp.com",
projectId:"snake-ultimate-by-soso"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* USER */
let currentUser=null
let totalFruits=0
let startTime=Date.now()

/* AUTH */
function showLogin(){auth.style.display="none";login.style.display="block"}
function showRegister(){login.style.display="none";auth.style.display="block"}

async function register(){
let user=username.value
let pass=password.value

if(user.length<1||user.length>12){authMsg.innerText="Pseudo invalide";return}
if(pass.length<1||pass.length>50){authMsg.innerText="Mot de passe invalide";return}

let doc=await db.collection("users").doc(user).get()
if(doc.exists){authMsg.innerText="Déjà pris";return}

await db.collection("users").doc(user).set({
password:pass,bestScore:0,fruits:0,time:0
})

currentUser=user
startApp()
}

async function login(){
let doc=await db.collection("users").doc(loginUser.value).get()
if(!doc.exists||doc.data().password!==loginPass.value){
loginMsg.innerText="Incorrect";return
}
currentUser=loginUser.value
startApp()
}

function startApp(){
auth.style.display="none"
login.style.display="none"
menu.style.display="block"
}

function logout(){
currentUser=null
menu.style.display="none"
profile.style.display="none"
auth.style.display="block"
}

/* SAVE */
async function saveData(){
if(!currentUser)return
let doc=await db.collection("users").doc(currentUser).get()
let d=doc.data()

await db.collection("users").doc(currentUser).update({
bestScore:Math.max(d.bestScore,score),
fruits:d.fruits+totalFruits,
time:d.time+Math.floor((Date.now()-startTime)/1000)
})
}

/* PROFILE */
async function showProfile(){
menu.style.display="none"
profile.style.display="block"

let d=(await db.collection("users").doc(currentUser).get()).data()

profileName.innerText="Pseudo : "+currentUser
profileStats.innerText="Score max : "+d.bestScore+" | Fruits : "+d.fruits+" | Temps : "+d.time+"s"
}

/* LEADERBOARD */
async function showLeaderboard(){
menu.style.display="none"
leaderboard.style.display="block"

let snap=await db.collection("users").orderBy("bestScore","desc").limit(10).get()
leaderboardList.innerHTML=""
snap.forEach(doc=>{
leaderboardList.innerHTML+=`<p>${doc.id} - ${doc.data().bestScore}</p>`
})
}
